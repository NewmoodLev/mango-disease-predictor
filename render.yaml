services:
  - type: web
    name: mango-disease-predictor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >
      streamlit run farmer_app/app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
